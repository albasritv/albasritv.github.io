<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مباريات اليوم - بث مباشر</title>
    <!-- خطوط عربية احترافية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* =========================================
           1. حماية الواجهة (منع التحديد والسحب)
           ========================================= */
        body {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        img {
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* =========================================
           2. التصميم العام والألوان
           ========================================= */
        :root {
            --bg-main: #090e17; 
            --bg-card: rgba(21, 28, 44, 0.6);
            --bg-card-solid: #151c2c;
            --primary-color: #00e5ff; 
            --primary-glow: rgba(0, 229, 255, 0.4);
            --live-color: #ff2a55; 
            --live-glow: rgba(255, 42, 85, 0.4);
            --text-light: #ffffff;
            --text-gray: #a0aec0;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(0, 229, 255, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            padding-bottom: 50px;
            background-image: 
                radial-gradient(circle at 15% 50px, rgba(0, 229, 255, 0.1), transparent 300px),
                radial-gradient(circle at 85% 300px, rgba(255, 42, 85, 0.05), transparent 300px);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .header {
            background: rgba(9, 14, 23, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 18px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(to left, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; animation: fadeIn 0.5s ease; }
        #matches-container { display: flex; flex-direction: column; gap: 15px; }

        /* =========================================
           3. تصميم بطاقة المباراة (Mobile First)
           ========================================= */
        .match-card {
            background: var(--bg-card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border: 1px solid var(--border-color);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }

        .match-card::after {
            content: ''; position: absolute; inset: 0; border-radius: 20px; border: 2px solid transparent;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude; opacity: 0; transition: 0.4s;
        }

        .match-card:hover { transform: translateY(-5px); background: var(--bg-card-solid); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); border-color: var(--border-hover); }
        .match-card:hover::after { opacity: 1; }

        .static-card {
            cursor: default; transform: none !important; margin-bottom: 25px;
            background: linear-gradient(145deg, var(--bg-card-solid), #0b0f19);
            border: 1px solid var(--primary-color); box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }

        .team { display: flex; flex-direction: column; align-items: center; width: 32%; text-align: center; z-index: 2; }
        .team img { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; background: rgba(255, 255, 255, 0.03); border-radius: 50%; padding: 8px; border: 2px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .match-card:hover .team img { border-color: var(--primary-color); transform: scale(1.1) rotate(5deg); box-shadow: 0 0 15px var(--primary-glow); }
        .static-card .team img { border-color: var(--primary-color); }
        .team span { font-size: 0.95rem; font-weight: 700; color: var(--text-light); line-height: 1.3; }

        .match-info { width: 36%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }

        /* =========================================
           ألوان حالات المباراة (تعديل حسب طلبك)
           ========================================= */
        
        /* 1. انتهت (اللون الأصلي الرمادي) */
        .status {
            font-size: 0.8rem; padding: 4px 12px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.05); color: var(--text-gray);
            margin-bottom: 8px; font-weight: 700; white-space: nowrap;
        }

        /* 2. لم تبدأ (لون أخضر) */
        .status.not-started {
            background: rgba(0, 255, 136, 0.15); color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        /* 3. جارية الآن (أحمر ينبض) */
        .status.live {
            background: rgba(255, 42, 85, 0.15); color: var(--live-color);
            border: 1px solid var(--live-glow); animation: pulse-live 1.5s infinite;
            box-shadow: 0 0 10px var(--live-glow);
        }

        .score-container { font-size: 2rem; font-weight: 900; letter-spacing: 2px; color: var(--primary-color); text-shadow: 0 0 10px var(--primary-glow); }
        
        /* تعديل مربع الوقت (بدون ملصق) */
        .time-badge { font-size: 1.2rem; color: var(--text-light); font-weight: 900; letter-spacing: 1px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }

        /* =========================================
           4. صفحة الفيديو
           ========================================= */
        .controls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-light); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 0.95rem; font-weight: 700; font-family: 'Cairo', sans-serif; transition: 0.3s; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); }
        .back-btn:hover { background: var(--primary-color); color: #000; border-color: var(--primary-color); box-shadow: 0 0 15px var(--primary-glow); }

        .video-wrapper { width: 100%; background: #000; border-radius: 24px; overflow: hidden; margin-bottom: 25px; position: relative; border: 2px solid var(--primary-color); box-shadow: 0 0 30px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0,0,0,0.8); padding: 2px; animation: breathe 4s infinite alternate; }
        .video-inner { border-radius: 20px; overflow: hidden; width: 100%; height: 100%; position: relative; background: #000; }
        .video-wrapper iframe, .video-wrapper video { width: 100%; height: 450px; border: none; background: #000; display: block; }

        .kora-mask { position: absolute; top: 15px; left: 15px; width: 130px; height: 40px; background: #090e17; border-radius: 8px; z-index: 999; display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid var(--live-color); box-shadow: 0 4px 15px rgba(0,0,0,0.9); pointer-events: none; }
        .kora-mask span { color: #fff; font-weight: 700; font-size: 12px; }
        .kora-mask .dot { width: 8px; height: 8px; background-color: var(--live-color); border-radius: 50%; animation: pulse-live 1.5s infinite; }

        .servers-section { background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .servers-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 15px; color: var(--text-light); display: flex; align-items: center; gap: 8px; }
        .servers-title::before { content: ''; display: block; width: 4px; height: 18px; background: var(--primary-color); border-radius: 4px; box-shadow: 0 0 8px var(--primary-glow); }
        .servers-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; scrollbar-color: var(--primary-color) rgba(255,255,255,0.05); }
        .servers-list::-webkit-scrollbar { height: 6px; }
        .servers-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .servers-list::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .server-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-gray); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: 'Cairo', sans-serif; font-size: 0.9rem; transition: all 0.3s; white-space: nowrap; flex-shrink: 0; }
        .server-btn:hover { background: rgba(0, 229, 255, 0.1); border-color: var(--primary-color); color: var(--primary-color); }
        .server-btn.active { background: var(--primary-color); color: #000; border-color: var(--primary-color); box-shadow: 0 4px 15px var(--primary-glow); }

        .hidden { display: none !important; }
        
        .loader { text-align: center; margin-top: 80px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(0, 229, 255, 0.2); border-top: 4px solid var(--primary-color); border-radius: 50%; margin: 0 auto 15px auto; animation: spin 1s linear infinite; }
        .loader p { color: var(--text-gray); font-size: 1.1rem; font-weight: 700; }

        @keyframes pulse-live { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes breathe { 0% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.1), inset 0 0 10px rgba(0,0,0,0.8); } 100% { box-shadow: 0 0 40px rgba(0, 229, 255, 0.4), inset 0 0 20px rgba(0,0,0,0.9); } }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.4rem; }
            .match-card { padding: 15px 10px; border-radius: 16px; }
            .team img { width: 50px; height: 50px; padding: 5px; margin-bottom: 6px; }
            .team span { font-size: 0.8rem; }
            .score-container { font-size: 1.6rem; }
            .time-badge { font-size: 1rem; padding: 4px 10px; }
            .status { font-size: 0.75rem; padding: 3px 10px; }
            .video-wrapper iframe, .video-wrapper video { height: 230px; }
            .video-wrapper { border-radius: 16px; margin-bottom: 15px; border-width: 1px; }
            .video-inner { border-radius: 14px; }
            .kora-mask { transform: scale(0.75); transform-origin: top left; top: 10px; left: 10px; }
            .servers-section { padding: 15px; border-radius: 16px; }
            .server-btn { font-size: 0.85rem; padding: 8px 16px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>مباريات اليوم</h1>
    </header>

    <div class="container">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>جاري تحديث المباريات...</p>
        </div>

        <div id="matches-container" class="hidden"></div>

        <div id="player-container" class="hidden">
            <div class="controls-header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M5 12l7-7M5 12l7 7"/></svg>
                    العودة
                </button>
            </div>
            <div id="selected-match-header"></div>
            <div class="video-wrapper">
                <div class="video-inner">
                    <div class="kora-mask"><div class="dot"></div><span>بث مباشر حصري</span></div>
                    <iframe id="video-frame" class="hidden" allowfullscreen="true" frameborder="0" scrolling="no"></iframe>
                    <video id="hls-video" class="hidden" controls autoplay playsinline></video>
                </div>
            </div>
            <div class="servers-section">
                <div class="servers-title">اختر سيرفر المشاهدة</div>
                <div class="servers-list" id="servers-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.albasritv1.workers.dev/";
        const loader = document.getElementById("loader");
        const loaderText = document.querySelector("#loader p");
        const matchesContainer = document.getElementById("matches-container");
        const playerContainer = document.getElementById("player-container");
        const selectedMatchHeader = document.getElementById("selected-match-header");
        const videoFrame = document.getElementById("video-frame");
        const hlsVideo = document.getElementById("hls-video");
        const serversList = document.getElementById("servers-list");
        let hlsInstance = null;

        function fixImageUrl(url) {
            if (!url) return "https://via.placeholder.com/70x70/151c2c/ffffff?text=نادي";
            if (url.startsWith("http")) return url;
            if (url.startsWith("//")) return "https:" + url;
            if (url.startsWith("/")) return "https://koooracity.com" + url;
            return url;
        }

        // دالة تحويل الوقت وتنسيقه (إزالة الساعة، ضبط 12 ساعة، إضافة م/ص)
        function formatArabicTime(timeStr) {
            if (!timeStr) return "";
            // إزالة أي ملصقات مثل ⏰ وتفريغ المسافات
            let t = timeStr.toString().replace(/⏰/g, '').trim();
            
            // استخراج الساعات والدقائق
            let match = t.match(/(\d{1,2}):(\d{2})/);
            if (match) {
                let h = parseInt(match[1]);
                let m = match[2];
                let ampm = h >= 12 ? 'م' : 'ص';
                h = h % 12;
                h = h ? h : 12; // تحويل الصفر إلى 12
                return `${h}:${m} ${ampm}`;
            }
            // في حال فشل التحليل، استبدال الكلمات فقط
            return t.replace(/PM/i, 'م').replace(/AM/i, 'ص');
        }

        function generateCardInnerHtml(match, statusClass, displayStatus, displayMiddleHtml) {
            return `
                <div class="team"><img src="${fixImageUrl(match.team1.logo)}"><span>${match.team1.name}</span></div>
                <div class="match-info">
                    <div class="status ${statusClass}">${displayStatus}</div>
                    ${displayMiddleHtml}
                </div>
                <div class="team"><img src="${fixImageUrl(match.team2.logo)}"><span>${match.team2.name}</span></div>
            `;
        }

        async function fetchMatches() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                if (json.success && json.data) renderMatches(json.data);
                else {
                    loader.querySelector('.spinner').style.display = 'none';
                    loaderText.innerHTML = "حدث خطأ أثناء تحميل المباريات.";
                }
            } catch (error) {
                loader.querySelector('.spinner').style.display = 'none';
                loaderText.innerHTML = "لا يوجد اتصال بالسيرفر.";
            }
        }

        function renderMatches(matches) {
            loader.classList.add("hidden");
            matchesContainer.classList.remove("hidden");
            matchesContainer.innerHTML = "";

            if (matches.length === 0) {
                matchesContainer.innerHTML = "<h3 style='text-align:center; padding: 40px 0; color:var(--text-gray);'>لا توجد مباريات متاحة اليوم</h3>";
                return;
            }

            matches.forEach(match => {
                const isLive = match.priority === 1;
                const isFinished = match.priority === 3;
                const team1Goals = match.team1.goals ? match.team1.goals : "";
                const team2Goals = match.team2.goals ? match.team2.goals : "";
                const score = (team1Goals !== "" && team2Goals !== "") ? `${team1Goals} - ${team2Goals}` : "0 - 0";

                let displayMiddleHtml = "";
                let displayStatus = match.status;
                let statusClass = "";

                if (isLive) {
                    displayStatus = "جارية الآن"; 
                    displayMiddleHtml = `<div class="score-container">${score}</div>`;
                    statusClass = "live"; // أحمر ينبض
                } else if (isFinished) {
                    displayStatus = "انتهت"; 
                    displayMiddleHtml = `<div class="score-container">${score}</div>`;
                    statusClass = ""; // رمادي (اللون الأصلي)
                } else {
                    displayStatus = "لم تبدأ"; 
                    let formattedTime = formatArabicTime(match.time);
                    displayMiddleHtml = `<div class="time-badge">${formattedTime}</div>`;
                    statusClass = "not-started"; // أخضر مضيء
                }

                const cardInnerHtml = generateCardInnerHtml(match, statusClass, displayStatus, displayMiddleHtml);
                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = cardInnerHtml;
                
                card.addEventListener("click", () => {
                    selectedMatchHeader.innerHTML = `<div class="match-card static-card">${cardInnerHtml}</div>`;
                    fetchServers(match.link);
                });
                
                matchesContainer.appendChild(card);
            });
        }

        async function fetchServers(matchUrl) {
            matchesContainer.classList.add("hidden");
            playerContainer.classList.add("hidden");
            loader.classList.remove("hidden");
            loader.querySelector('.spinner').style.display = 'block';
            loaderText.innerHTML = "جاري تجهيز البث المباشر...";

            try {
                const response = await fetch(matchUrl);
                const json = await response.json();

                loader.classList.add("hidden");
                playerContainer.classList.remove("hidden");
                serversList.innerHTML = "";
                stopVideo(); 

                if (json.success && json.servers && json.servers.length > 0) {
                    changeServer(json.servers[0].url, json.servers[0].type, null);
                    json.servers.forEach((server, index) => {
                        const btn = document.createElement("button");
                        btn.className = "server-btn";
                        if(index === 0) btn.classList.add("active");
                        
                        let serverName = server.name;
                        if(serverName.includes("M3U") || serverName.includes("مباشر")) serverName = "جودة متعددة " + (index + 1);
                        else if(serverName.includes("Web") || serverName.includes("ويب")) serverName = "سيرفر ويب " + (index + 1);

                        btn.innerText = serverName;
                        btn.onclick = (e) => changeServer(server.url, server.type, e.target);
                        serversList.appendChild(btn);
                    });
                } else {
                    serversList.innerHTML = "<div style='color:var(--live-color); font-weight:700; width:100%; text-align:center;'>البث غير متوفر حالياً. جرب وقت المباراة.</div>";
                }
            } catch (error) {
                loader.querySelector('.spinner').style.display = 'none';
                loaderText.innerHTML = "حدث خطأ أثناء جلب البث.";
                setTimeout(goBack, 2000);
            }
        }

        function changeServer(url, type, btnElement) {
            stopVideo(); 
            if (type === "m3u8") {
                videoFrame.classList.add("hidden");
                hlsVideo.classList.remove("hidden");
                if (Hls.isSupported()) {
                    hlsInstance = new Hls(); hlsInstance.loadSource(url); hlsInstance.attachMedia(hlsVideo);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => hlsVideo.play().catch(()=>{}));
                } else if (hlsVideo.canPlayType('application/vnd.apple.mpegurl')) {
                    hlsVideo.src = url; hlsVideo.play().catch(()=>{});
                }
            } else {
                hlsVideo.classList.add("hidden");
                videoFrame.classList.remove("hidden");
                videoFrame.src = url;
            }
            if (btnElement) {
                document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
                btnElement.classList.add("active");
            }
        }

        function stopVideo() {
            videoFrame.src = "";
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            hlsVideo.pause(); hlsVideo.removeAttribute('src'); hlsVideo.load();
        }

        function goBack() {
            stopVideo();
            playerContainer.classList.add("hidden");
            loader.classList.add("hidden");
            matchesContainer.classList.remove("hidden");
            selectedMatchHeader.innerHTML = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        fetchMatches();

        // ==============================================================
        // نظام الحماية الشامل 
        // ==============================================================

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's' || e.key === 'C' || e.key === 'c' || e.key === 'P' || e.key === 'p')) {
                e.preventDefault(); navigator.clipboard.writeText(''); return false;
            }
        });
        document.addEventListener('copy', function(e) { e.preventDefault(); e.clipboardData.setData('text/plain', ''); });

        setInterval(function() {
            var before = new Date().getTime();
            debugger; 
            var after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh; background:#000;'><h1 style='color:#ff2a55; font-family:Cairo;'>غير مسموح بالدخول لأدوات المطور!</h1></div>";
            }
        }, 1000);
    </script>
</body>
</html>
