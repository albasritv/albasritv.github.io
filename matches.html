    <style>
        :root {
            --bg-main: #090e17;
            --bg-card: rgba(21, 28, 44, 0.7);
            --primary-color: #00e5ff; 
            --text-light: #ffffff;
            --text-gray: #a0aec0;
            --live-color: #ff2a55;
        }

        body {
            background-color: var(--bg-main) !important;
            margin: 0 !important;
            padding: 0 !important;
            font-family: 'Cairo', sans-serif !important;
            color: var(--text-light);
            /* منع تحديد النصوص لزيادة الحماية */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #app-dynamic-wrapper {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        .main-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 25px;
            background: linear-gradient(to left, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .match-card:hover { border-color: var(--primary-color); background: #151c2c; }
        .static-card { cursor: default; border-color: var(--primary-color); }

        .team { display: flex; flex-direction: column; align-items: center; width: 33%; text-align: center; }
        .team img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 8px; }
        .team span { font-size: 0.95rem; font-weight: 700; }
        
        .match-info { width: 34%; display: flex; flex-direction: column; align-items: center; }
        .status { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-gray); margin-bottom: 5px; font-weight: 700; }
        .status.live { background: rgba(255, 42, 85, 0.15); color: var(--live-color); border: 1px solid var(--live-color); }
        .status.not-started { background: rgba(0, 255, 136, 0.15); color: #00ff88; }

        .score { font-size: 1.7rem; font-weight: 900; color: var(--primary-color); letter-spacing: 2px; }
        .time { font-size: 1rem; font-weight: 700; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 8px; }

        .back-btn { 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 18px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Cairo'; 
            font-weight: 700; 
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: var(--live-color); color: #fff; border-color: var(--live-color); }
        
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--primary-color); }
        .video-wrapper iframe, .video-wrapper video { width: 100%; height: 430px; border: none; display: block; }

        /* تعديلات شاشة التكبير (Fullscreen) */
        .video-wrapper:fullscreen { border: none; border-radius: 0; }
        .video-wrapper:fullscreen iframe, .video-wrapper:fullscreen video { height: 100vh; }

        /* حاوية زر التكبير لجعله في المنتصف */
        .fullscreen-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .fullscreen-btn { 
            background: rgba(0, 229, 255, 0.08); 
            color: var(--primary-color); 
            border: 1px solid var(--primary-color); 
            padding: 10px 30px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-family: 'Cairo'; 
            font-weight: 900; 
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
        }
        .fullscreen-btn:hover { 
            background: var(--primary-color); 
            color: #000; 
            box-shadow: 0 0 15px var(--primary-color);
        }

        .player-ads-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-click-btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Cairo';
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 0 0 15px var(--primary-color);
            cursor: pointer;
        }

        .servers-box { background: var(--bg-card); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
        .servers-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .server-btn { background: rgba(255,255,255,0.05); color: var(--text-gray); border: 1px solid rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: 700; white-space: nowrap; }
        .server-btn.active { background: var(--primary-color); color: #000; }

        /* === تنسيق إعلانات البانر === */
        .ad-container-320 {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ad-container-320::before {
            content: 'إعلان ممول';
            font-size: 0.7rem;
            color: var(--text-gray);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .match-page-ads-list {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
        }
        .ads-list-title {
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .seo-keywords-footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            line-height: 1.6;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .hidden { display: none !important; }
        .msg { text-align: center; color: var(--text-gray); padding: 50px 0; font-weight: 700; }

        @media (max-width: 768px) {
            .video-wrapper iframe, .video-wrapper video { height: 230px; }
            .team img { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

        </div>
        
        <div class="seo-keywords-footer">
            أفضل موقع لمشاهدة البث المباشر. تغطية شاملة تنافس يلا شوت (Yalla Shoot)، الأسطورة (The Star)، النجم، و المصري تي في (Al-Masry TV). تابع بطولاتك المفضلة مجاناً وبدون تقطيع.

    </div>

    <script>
        // نظام الحماية
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (
                    e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                    (e.ctrlKey && e.key === 'U')
                ) {
                    e.preventDefault();
                    return false;
                }
            });
            function staticProtection() {
                function debuggerTrigger(i) {
                    if (("" + i / i).length !== 1 || i % 20 === 0) {
                        (function() {}.constructor("debugger")());
                    } else {
                        (function() {}.constructor("debugger")());
                    }
                    debuggerTrigger(++i);
                }
                try { debuggerTrigger(0); } catch (e) { setTimeout(staticProtection, 50); }
            }
            setInterval(staticProtection, 200);
        })();

        // دالة تكبير شاشة البث (Fullscreen)
        function toggleFullScreen() {
            const playerContainer = document.getElementById('main-video-wrapper');
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                if (playerContainer.requestFullscreen) {
                    playerContainer.requestFullscreen();
                } else if (playerContainer.msRequestFullscreen) {
                    playerContainer.msRequestFullscreen();
                } else if (playerContainer.mozRequestFullScreen) {
                    playerContainer.mozRequestFullScreen();
                } else if (playerContainer.webkitRequestFullscreen) {
                    playerContainer.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        const ADSTERRA_DIRECT_LINK = "https://www.effectivecpmnetwork.com/czmyq4gii?key=68ace7e98fec89536331070124cdcdbb";
        const WORKER_URL = "https://ali.albasritv1.workers.dev/";
        
        const stateMsg = document.getElementById("state-msg");
        const mainScheduleArea = document.getElementById("main-schedule-area");
        const matchesList = document.getElementById("matches-list");
        const playerView = document.getElementById("player-view");
        const currentMatchCard = document.getElementById("current-match-card");
        const iframePlayer = document.getElementById("iframe-player");
        const hlsPlayer = document.getElementById("hls-player");
        const serversRender = document.getElementById("servers-render");
        const playerClickLayer = document.getElementById("player-click-layer");
        
        let activeHls = null;
        let isAdClicked = false; 
        let currentUrl = "";
        let currentType = "";

        window.addEventListener('popstate', function (event) {
            if (!playerView.classList.contains("hidden")) {
                closePlayerAndReturn();
            }
        });

        function handleAdAndPlay() {
            if (ADSTERRA_DIRECT_LINK && ADSTERRA_DIRECT_LINK !== "") {
                window.open(ADSTERRA_DIRECT_LINK, '_blank');
            }
            playerClickLayer.classList.add("hidden");
            isAdClicked = true;
            startStreamExecution(currentUrl, currentType);
        }

        function getCleanImg(url) {
            if (!url) return "https://via.placeholder.com/55x55/151c2c/ffffff?text=TEAM";
            let u = url.trim();
            if (u.startsWith("http://") || u.startsWith("https://")) return u;
            if (u.startsWith("//")) return "https:" + u;
            return "https://koooracity.com/" + u.replace(/^\//, '');
        }

        function cleanTime(t) {
            if(!t) return "";
            let clean = t.toString().replace(/⏰/g, '').trim();
            let parts = clean.match(/(\d{1,2}):(\d{2})/);
            if (parts) {
                let hours = parseInt(parts[1]);
                let minutes = parts[2];
                let ampm = hours >= 12 ? 'م' : 'ص';
                hours = hours % 12 || 12;
                return `${hours}:${minutes} ${ampm}`;
            }
            return clean;
        }

        function buildCardHtml(m, statusClass, statusTxt, centerHtml) {
            return `
                <div class="team"><img src="${getCleanImg(m.team1.logo)}" onerror="this.src='https://via.placeholder.com/55x55/151c2c/ffffff?text=LOGO'"><span>${m.team1.name}</span></div>
                <div class="match-info"><div class="status ${statusClass}">${statusTxt}</div>${centerHtml}</div>
                <div class="team"><img src="${getCleanImg(m.team2.logo)}" onerror="this.src='https://via.placeholder.com/55x55/151c2c/ffffff?text=LOGO'"><span>${m.team2.name}</span></div>
            `;
        }

        async function loadData() {
            try {
                const res = await fetch(WORKER_URL);
                const result = await res.json();
                if (result.success && result.data) {
                    displayData(result.data);
                } else {
                    stateMsg.innerText = "لا تتوفر مباريات مجدولة حالياً بالسيرفر.";
                }
            } catch (e) {
                stateMsg.innerText = "فشل الاتصال بـ Worker البث، تأكد من الرابط.";
            }
        }

        function displayData(list) {
            stateMsg.classList.add("hidden");
            mainScheduleArea.classList.remove("hidden");
            matchesList.innerHTML = "";

            if(list.length === 0) {
                matchesList.innerHTML = "<div class='msg'>لا توجد مباريات لليوم.</div>";
                return;
            }

            list.forEach(m => {
                let statusClass = "";
                let statusTxt = m.status;
                let centerHtml = "";
                const scoreStr = `${m.team1.goals || 0} - ${m.team2.goals || 0}`;

                if (m.priority === 1) {
                    statusTxt = "مباشر"; statusClass = "live";
                    centerHtml = `<div class="score">${scoreStr}</div>`;
                } else if (m.priority === 3) {
                    statusTxt = "انتهت";
                    centerHtml = `<div class="score">${scoreStr}</div>`;
                } else {
                    statusTxt = "لم تبدأ"; statusClass = "not-started";
                    centerHtml = `<div class="time">${cleanTime(m.time)}</div>`;
                }

                let html = buildCardHtml(m, statusClass, statusTxt, centerHtml);
                let div = document.createElement("div");
                div.className = "match-card";
                div.innerHTML = html;
                div.onclick = () => {
                    history.pushState({view: "player"}, "");
                    currentMatchCard.innerHTML = `<div class="match-card static-card">${html}</div>`;
                    loadLiveLinks(m.link);
                };
                matchesList.appendChild(div);
            });
        }

        async function loadLiveLinks(linkUrl) {
            mainScheduleArea.classList.add("hidden");
            stateMsg.classList.remove("hidden");
            stateMsg.innerText = "جاري الاتصال بسيرفر البث...";

            try {
                const res = await fetch(linkUrl);
                const result = await res.json();
                stateMsg.classList.add("hidden");
                playerView.classList.remove("hidden");
                serversRender.innerHTML = "";
                
                resetStream();
                isAdClicked = false;
                playerClickLayer.classList.remove("hidden");

                if (result.success && result.servers && result.servers.length > 0) {
                    setupVisiblePlayer(result.servers[0].url, result.servers[0].type, null);

                    result.servers.forEach((srv, i) => {
                        let btn = document.createElement("button");
                        btn.className = "server-btn";
                        if(i === 0) btn.classList.add("active");
                        
                        let name = srv.name;
                        if(name.includes("M3U")) name = "جودة متعددة " + (i + 1);
                        else if(name.includes("Web")) name = "سيرفر رئيسي " + (i + 1);

                        btn.innerText = name;
                        btn.onclick = (e) => setupVisiblePlayer(srv.url, srv.type, e.target);
                        serversRender.appendChild(btn);
                    });
                } else {
                    serversRender.innerHTML = "<div style='color:var(--live-color); font-weight:700;'>روابط البث قيد التجهيز...</div>";
                }
            } catch(e) {
                triggerBackBehavior();
            }
        }

        function setupVisiblePlayer(url, type, btn) {
            resetStream();
            currentUrl = url;
            currentType = type;
            isAdClicked = false;
            playerClickLayer.classList.remove("hidden");

            if(btn) {
                document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            }

            if (type === "m3u8") {
                iframePlayer.classList.add("hidden");
                hlsPlayer.classList.remove("hidden");
            } else {
                hlsPlayer.classList.add("hidden");
                iframePlayer.classList.remove("hidden");
                iframePlayer.src = url; 
            }
        }

        function startStreamExecution(url, type) {
            if (type === "m3u8") {
                if (Hls.isSupported()) {
                    activeHls = new Hls(); 
                    activeHls.loadSource(url); 
                    activeHls.attachMedia(hlsPlayer);
                    activeHls.on(Hls.Events.MANIFEST_PARSED, () => {
                        hlsPlayer.play().catch(()=>{});
                    });
                } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    hlsPlayer.src = url; 
                    hlsPlayer.play().catch(()=>{});
                }
            } else {
                iframePlayer.src = url;
            }
        }

        function resetStream() {
            iframePlayer.src = "";
            if (activeHls) { activeHls.destroy(); activeHls = null; }
            hlsPlayer.pause(); 
            hlsPlayer.removeAttribute('src'); 
            hlsPlayer.load();
        }

        function triggerBackBehavior() {
            if (window.history.state && window.history.state.view === "player") {
                window.history.back();
            } else {
                closePlayerAndReturn();
            }
        }

        function closePlayerAndReturn() {
            resetStream();
            playerView.classList.add("hidden");
            mainScheduleArea.classList.remove("hidden");
        }

        loadData();
    </script>
