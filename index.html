<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>البصري تيفي للبث المباشر</title>
    <meta name="description" content="البصري تيفي - البث المباشر للمباريات بجودات متعددة وبدون تقطيع.">
    
    <!-- خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مشغل HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* === الألوان والمتغيرات === */
        :root {
            --bg-dark: #050a15;
            --header-bg: #0b1325;
            --card-bg: #121c33;
            --card-hover: #1a2642;
            --accent-cyan: #00d4ff;
            --accent-gold: #ffc107;
            --live-red: #ff3333;
            --telegram-blue: #0088cc;
            --whatsapp-green: #25d366;
            --instagram-pink: #e1306c;
            --text-light: #ffffff;
            --text-gray: #a0aec0;
            --border-color: #1e293b;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            color: var(--text-light);
            -webkit-user-select: none;
            user-select: none;
            padding-top: 80px; /* مسافة الهيدر */
        }

        /* === الشريط العلوي (Header) === */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(11, 19, 37, 0.95); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--border-color); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .site-title {
            font-size: 1.4rem; font-weight: 900;
            background: linear-gradient(to left, var(--accent-cyan), var(--text-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }
        .site-title i { color: var(--accent-cyan); -webkit-text-fill-color: initial; }
        
        /* أيقونات التواصل مع Underline */
        .social-icons { display: flex; gap: 20px; }
        .social-icons a {
            color: var(--text-light); font-size: 1.6rem; transition: all 0.3s ease;
            position: relative; padding-bottom: 5px; text-decoration: none;
            display: flex; justify-content: center; align-items: center;
        }
        .social-icons a::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0%;
            height: 3px; background: var(--text-light); transition: all 0.3s ease;
            transform: translateX(-50%); border-radius: 2px;
        }
        .social-icons a:hover::after { width: 100%; }
        
        .social-icons .fa-telegram:hover { color: var(--telegram-blue); }
        .social-icons .fa-telegram:hover::after { background: var(--telegram-blue); }
        .social-icons .fa-whatsapp:hover { color: var(--whatsapp-green); }
        .social-icons .fa-whatsapp:hover::after { background: var(--whatsapp-green); }
        .social-icons .fa-instagram:hover { color: var(--instagram-pink); }
        .social-icons .fa-instagram:hover::after { background: var(--instagram-pink); }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px 30px 15px; }

        /* === الإعلانات (التنسيق الجمالي) === */
        .ad-container { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border-radius: var(--radius); overflow: hidden; }
        .ad-banner { min-height: 50px; }
        .ad-native { margin-top: 30px; border-top: 2px dashed var(--border-color); padding-top: 20px; }

        /* === شريط التيليجرام === */
        .telegram-join-bar {
            background: linear-gradient(135deg, #0b1325, #121c33);
            border: 3px solid var(--telegram-blue); border-radius: var(--radius);
            padding: 15px; margin-bottom: 20px; text-align: center;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            text-decoration: none; color: white; font-weight: 900; font-size: 1.1rem;
            animation: pulse-border 2s infinite; transition: all 0.3s;
        }
        .telegram-join-bar:hover { background: var(--telegram-blue); color: white; transform: scale(1.02); }
        .telegram-join-bar i { font-size: 1.8rem; animation: bounce 2s infinite; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 136, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0); }
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* === بطاقات المباريات === */
        .match-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius);
            padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .match-card:hover {
            transform: translateY(-4px); background: var(--card-hover); border-color: var(--accent-cyan);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.15);
        }
        .static-card { cursor: default; transform: none !important; border-color: var(--accent-gold); box-shadow: 0 5px 15px rgba(255, 193, 7, 0.1); margin-bottom: 20px; background: linear-gradient(145deg, #1a2642, #121c33); }

        .team-box { width: 33%; text-align: center; }
        .team-box img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 8px; }
        .team-box span { display: block; font-size: 0.95rem; font-weight: 800; }
        
        .center-info { width: 34%; text-align: center; }
        .status-pill { display: inline-block; padding: 4px 15px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; margin-bottom: 8px; }
        .is-live { background: rgba(255, 51, 51, 0.15); color: var(--live-red); border: 1px solid var(--live-red); animation: blink 1.5s infinite; }
        .is-upcoming { background: rgba(255, 193, 7, 0.1); color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .is-ended { background: rgba(160, 174, 192, 0.1); color: var(--text-gray); border: 1px solid var(--text-gray); }
        .match-time-score { font-size: 1.4rem; font-weight: 900; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 6px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* === المشغل والتحميل === */
        .player-wrapper {
            background: #000; border-radius: var(--radius); overflow: hidden; border: 2px solid var(--border-color);
            aspect-ratio: 16 / 9; width: 100%; position: relative; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player-wrapper iframe, .player-wrapper video { width: 100%; height: 100%; border: none; object-fit: contain; }
        .player-wrapper:fullscreen { border: none; border-radius: 0; }

        /* عنصر التحميل */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a15; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .loader-spinner {
            width: 60px; height: 60px; border: 5px solid rgba(0, 212, 255, 0.2);
            border-top: 5px solid var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        .loading-text { font-size: 1.2rem; font-weight: 900; color: var(--accent-cyan); animation: pulse-text 1.5s infinite; }

        /* المشغل الوهمي */
        .fake-player-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(2px); z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .play-btn-fake {
            width: 80px; height: 80px; background: var(--live-red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 35px;
            margin-bottom: 15px; border: 4px solid rgba(255,255,255,0.3); transition: all 0.3s;
            animation: pulse-border 2s infinite; padding-left: 5px;
        }
        .fake-player-overlay:hover .play-btn-fake { transform: scale(1.1); background: #ff1a1a; }
        .fake-text { font-size: 1.4rem; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* === الأزرار والسيرفرات === */
        .btn-fullscreen { width: 100%; background: var(--accent-cyan); color: #000; border: none; font-weight: 900; font-family: 'Cairo', sans-serif; padding: 12px; border-radius: var(--radius); cursor: pointer; transition: 0.3s; margin-bottom: 20px; font-size: 1.1rem; }
        .btn-fullscreen:hover { background: #00bce6; }
        .btn-back { width: 100%; background: transparent; border: 2px solid var(--border-color); color: var(--text-light); font-weight: 800; font-family: 'Cairo'; padding: 10px; border-radius: var(--radius); cursor: pointer; transition: 0.3s; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-back:hover { background: var(--border-color); }

        .servers-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .server-btn { flex: 1 1 100px; background: var(--card-bg); color: var(--text-light); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; text-align: center; transition: 0.2s; }
        .server-btn:hover { background: var(--card-hover); }
        .server-btn.active { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); }

        .hidden { display: none !important; }
        .global-loading { text-align: center; padding: 50px 0; }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <header class="top-bar">
        <div class="site-title">
            <i class="fa-solid fa-tv"></i> البصري تيفي
        </div>
        <div class="social-icons">
            <a href="رابط_انستجرام_هنا" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="رابط_واتساب_هنا" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="رابط_تيليجرام_هنا" target="_blank"><i class="fa-brands fa-telegram"></i></a>
        </div>
    </header>

    <div class="container">
        
        <!-- ===================================== -->
        <!-- الصفحة الرئيسية (جدول المباريات) -->
        <!-- ===================================== -->
        <div id="schedule-view">
            
            <!-- إعلان البانر في البداية -->
            <div class="ad-container ad-banner">
                <script>
                  atOptions = { 'key' : '7be1c70617ec5303f18319e3e3453d6f', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script src="https://www.highperformanceformat.com/7be1c70617ec5303f18319e3e3453d6f/invoke.js"></script>
            </div>

            <!-- المباريات -->
            <div id="global-loading" class="global-loading">
                <div class="loader-spinner"></div>
                <div class="loading-text">جاري إحضار المباريات...</div>
            </div>
            <div id="matches-list"></div>

            <!-- إعلان البانر في الأسفل بعد المباريات -->
            <div class="ad-container ad-banner">
                <script>
                  atOptions = { 'key' : '7be1c70617ec5303f18319e3e3453d6f', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script src="https://www.highperformanceformat.com/7be1c70617ec5303f18319e3e3453d6f/invoke.js"></script>
            </div>
            
        </div>

        <!-- ===================================== -->
        <!-- صفحة البث (المباراة) -->
        <!-- ===================================== -->
        <div id="player-view" class="hidden">
            
            <button class="btn-back" onclick="goBackToSchedule()">
                <i class="fa-solid fa-arrow-right"></i> العودة لجدول المباريات
            </button>

            <a href="رابط_تيليجرام_هنا" target="_blank" class="telegram-join-bar">
                <i class="fa-brands fa-telegram"></i>
                انضم لقناتنا على تيليجرام لمتابعة كل جديد!
            </a>

            <!-- إعلان البانر في أعلى صفحة المباراة -->
            <div class="ad-container ad-banner">
                <script>
                  atOptions = { 'key' : '7be1c70617ec5303f18319e3e3453d6f', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script src="https://www.highperformanceformat.com/7be1c70617ec5303f18319e3e3453d6f/invoke.js"></script>
            </div>

            <!-- تفاصيل المباراة والمشغل -->
            <div id="active-match-card"></div>

            <div class="player-wrapper" id="player-wrapper">
                <div id="player-loading" class="loading-overlay hidden">
                    <div class="loader-spinner"></div>
                    <div class="loading-text">جاري إعداد البث المباشر...</div>
                </div>
                <div id="fake-overlay" class="fake-player-overlay hidden">
                    <div class="play-btn-fake"><i class="fa-solid fa-play"></i></div>
                    <div class="fake-text">اضغط هنا لبدء البث المباشر</div>
                </div>
                <iframe id="iframe-player" class="hidden" allowfullscreen="true" scrolling="no" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
                <video id="hls-player" class="hidden" controls playsinline></video>
            </div>
            
            <button class="btn-fullscreen" onclick="toggleFullScreen()">
                <i class="fa-solid fa-expand"></i> تكبير الشاشة
            </button>

            <div class="servers-grid" id="servers-grid"></div>

        </div>

        <!-- ===================================== -->
        <!-- إعلان الصور (الناتيف) في النهاية تماماً -->
        <!-- يظهر دائماً في أسفل الصفحة كآخر عنصر -->
        <!-- ===================================== -->
        <div class="ad-container ad-native">
            <script async="async" data-cfasync="false" src="https://pl29328193.effectivecpmnetwork.com/dc29d3daa278da998dee275e6e196c86/invoke.js"></script>
            <div id="container-dc29d3daa278da998dee275e6e196c86"></div>
        </div>

    </div>

    <!-- === الإعلانات الخلفية (Popunders) === -->
    <script src="https://pl29328174.effectivecpmnetwork.com/23/80/20/23802071908d14d26fe4c0737b641d1a.js"></script>
    <script src="https://pl29328192.effectivecpmnetwork.com/f4/56/ea/f456eac53dbbb3b6b6d9a3999e993f50.js"></script>

    <!-- === سكريبت التشغيل === -->
    <script>
        const WORKER_URL = "https://ali.albasritv1.workers.dev/";
        const FALLBACK_VIDEO = "https://ar-hosting.pages.dev/1777233612204.mp4";

        const scheduleView = document.getElementById("schedule-view");
        const playerView = document.getElementById("player-view");
        const matchesList = document.getElementById("matches-list");
        const globalLoading = document.getElementById("global-loading");
        const activeMatchCard = document.getElementById("active-match-card");
        const playerLoading = document.getElementById("player-loading");
        const fakeOverlay = document.getElementById("fake-overlay");
        const iframePlayer = document.getElementById("iframe-player");
        const hlsPlayer = document.getElementById("hls-player");
        const serversGrid = document.getElementById("servers-grid");

        let activeHls = null;

        window.addEventListener('popstate', function () {
            if (!playerView.classList.contains("hidden")) closePlayer();
        });

        function goBackToSchedule() {
            if(window.history.state) window.history.back();
            else closePlayer();
        }

        function getCleanImg(url) {
            if (!url) return "https://via.placeholder.com/60x60/121c33/ffffff?text=LOGO";
            let u = url.trim();
            if (u.startsWith("http") || u.startsWith("//")) return u.startsWith("//") ? "https:" + u : u;
            return "https://koooracity.com/" + u.replace(/^\//, '');
        }

        function formatTime(t) {
            if(!t) return "";
            let clean = t.toString().replace(/⏰/g, '').trim();
            let parts = clean.match(/(\d{1,2}):(\d{2})/);
            if (parts) {
                let hours = parseInt(parts[1], 10), minutes = parts[2];
                let isPM = clean.toLowerCase().includes('pm') || clean.includes('م') || hours >= 12;
                let ampm = isPM ? 'م' : 'ص'; 
                hours = hours % 12 || 12; 
                return `${hours}:${minutes} ${ampm}`;
            }
            return clean;
        }

        async function loadMatches() {
            try {
                const res = await fetch(WORKER_URL);
                const result = await res.json();
                globalLoading.classList.add("hidden");
                if (result.success && result.data) renderMatches(result.data);
            } catch (e) { 
                globalLoading.innerHTML = "حدث خطأ في جلب المباريات، يرجى التحديث."; 
            }
        }

        function renderMatches(list) {
            matchesList.innerHTML = "";
            if(list.length === 0) { matchesList.innerHTML = "<h3 style='text-align:center;'>لا توجد مباريات اليوم.</h3>"; return; }

            list.forEach(m => {
                let sClass = "", sText = m.status, cValue = "";
                const score = `${m.team1.goals || 0} - ${m.team2.goals || 0}`;
                
                if (m.priority === 1) { sText = "جاري الآن"; sClass = "is-live"; cValue = score; }
                else if (m.priority === 3) { sText = "انتهت"; sClass = "is-ended"; cValue = score; }
                else { sText = "لم تبدأ"; sClass = "is-upcoming"; cValue = formatTime(m.time); }

                let html = `
                    <div class="team-box"><img src="${getCleanImg(m.team1.logo)}" alt="Team"><span>${m.team1.name}</span></div>
                    <div class="center-info"><div class="status-pill ${sClass}">${sText}</div><div class="match-time-score">${cValue}</div></div>
                    <div class="team-box"><img src="${getCleanImg(m.team2.logo)}" alt="Team"><span>${m.team2.name}</span></div>
                `;
                
                let div = document.createElement("div"); div.className = "match-card"; div.innerHTML = html;
                
                div.onclick = () => {
                    activeMatchCard.innerHTML = `<div class="match-card static-card">${html}</div>`;
                    startMatch(m.link, m.priority);
                };
                matchesList.appendChild(div);
            });
        }

        async function startMatch(linkUrl, priority) {
            scheduleView.classList.add("hidden");
            playerView.classList.remove("hidden");
            history.pushState({view: "player"}, "");

            playerLoading.classList.remove("hidden");
            fakeOverlay.classList.add("hidden");
            iframePlayer.classList.add("hidden");
            hlsPlayer.classList.add("hidden");
            serversGrid.innerHTML = "";

            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (priority === 2 || priority === 3) {
                playerLoading.classList.add("hidden");
                fakeOverlay.classList.remove("hidden");
                setupServers([{ name: "تغطية المباراة", url: FALLBACK_VIDEO, type: "mp4" }]);
                return;
            }

            try {
                const res = await fetch(linkUrl); const result = await res.json();
                playerLoading.classList.add("hidden");

                if (result.success && result.servers && result.servers.length > 0) {
                    fakeOverlay.classList.remove("hidden");
                    setupServers(result.servers);
                } else {
                    fakeOverlay.classList.remove("hidden");
                    setupServers([{ name: "البث قريباً", url: FALLBACK_VIDEO, type: "mp4" }]);
                }
            } catch(e) { 
                playerLoading.classList.add("hidden");
                fakeOverlay.classList.remove("hidden");
                setupServers([{ name: "سيرفر بديل", url: FALLBACK_VIDEO, type: "mp4" }]);
            }
        }

        function setupServers(servers) {
            servers.forEach((srv, i) => {
                let btn = document.createElement("button"); btn.className = "server-btn";
                if(i === 0) btn.classList.add("active");
                btn.innerText = srv.name.includes("M3U") ? "سيرفر رئيسي " + (i+1) : (srv.name.includes("Web") ? "سيرفر احتياطي " + (i+1) : srv.name);
                
                btn.onclick = () => {
                    document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    
                    iframePlayer.classList.add("hidden"); hlsPlayer.classList.add("hidden");
                    fakeOverlay.classList.remove("hidden");
                    fakeOverlay.onclick = () => playServerVideo(srv.url, srv.type);
                };
                serversGrid.appendChild(btn);
            });
            fakeOverlay.onclick = () => playServerVideo(servers[0].url, servers[0].type);
        }

        function playServerVideo(url, type) {
            window.open("https://www.effectivecpmnetwork.com/czmyq4gii?key=68ace7e98fec89536331070124cdcdbb", "_blank");
            
            fakeOverlay.classList.add("hidden");
            stopVideo();

            if (type === "m3u8") {
                hlsPlayer.classList.remove("hidden");
                if (Hls.isSupported()) {
                    activeHls = new Hls(); activeHls.loadSource(url); activeHls.attachMedia(hlsPlayer);
                    activeHls.on(Hls.Events.MANIFEST_PARSED, () => hlsPlayer.play());
                } else { hlsPlayer.src = url; hlsPlayer.play(); }
            } 
            else if (type === "mp4" || url.endsWith(".mp4")) {
                iframePlayer.classList.add("hidden");
                hlsPlayer.classList.remove("hidden");
                hlsPlayer.src = url; hlsPlayer.play();
            } 
            else {
                iframePlayer.classList.remove("hidden");
                iframePlayer.src = url;
            }
        }

        function stopVideo() {
            iframePlayer.src = "";
            if (activeHls) { activeHls.destroy(); activeHls = null; }
            hlsPlayer.pause(); hlsPlayer.removeAttribute('src'); hlsPlayer.load();
        }

        function closePlayer() {
            stopVideo();
            playerView.classList.add("hidden");
            scheduleView.classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFullScreen() {
            const player = document.getElementById('player-wrapper');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (player.requestFullscreen) player.requestFullscreen();
                else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        loadMatches();
    </script>
</body>
</html>
