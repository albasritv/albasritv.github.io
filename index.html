<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البصري تيفي   </title>
    
    <!-- خطوط جوجل العربية (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* إعدادات الألوان المتغيرة بين الوضعين */
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --sidebar-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --watermark: rgba(0, 0, 0, 0.03);
            --border-radius: 20px;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f9fafb;
            --card-bg: #1f2937;
            --primary: #6366f1;
            --secondary: #22d3ee;
            --sidebar-bg: #1f2937;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            --watermark: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* العلامة المائية بالخلفية */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15vw;
            font-weight: 800;
            color: var(--watermark);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            user-select: none;
        }

        /* الهيدر (الشريط العلوي) */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* اسم الموقع في الجهة اليسرى */
        .brand {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .brand span.arabic {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to left, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand span.english {
            font-size: 10px;
            font-weight: 700;
            opacity: 0.7;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* حاوية الأزرار في اليمين (القائمة الجانبية والوضع الليلي) */
        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: var(--card-bg);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: var(--text-color);
            font-size: 18px;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .icon-btn:active {
            transform: scale(0.9);
            color: var(--primary);
        }

        /* القائمة الجانبية المنزلقة */
        .drawer {
            position: fixed;
            top: 0;
            right: -300px;
            width: 260px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }
        .drawer.open { right: 0; }
        [data-theme="dark"] .drawer { box-shadow: -5px 0 15px rgba(0,0,0,0.8); }

        .close-btn {
            align-self: flex-start;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 24px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .drawer h3 {
            font-size: 16px;
            opacity: 0.6;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .social-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
        }

        .tg-bg { background: #0088cc; }
        .ig-bg { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .yt-bg { background: #FF0000; }
        .wa-bg { background: #25D366; }

        /* طبقة التظليل للخلفية */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* المحتوى المركزي */
        main {
            padding: 10px 15px;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ---------------- التصميم الجديد للمواقع ---------------- */
        /* المواقع (فوق زر التطبيق مباشرة) */
        .top-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .top-socials a {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 24px;
            text-decoration: none;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }
        
        .top-socials a:active { transform: scale(0.9); }
        .top-socials a:hover { transform: translateY(-5px); }
        /* ----------------------------------------------------- */

        /* زر تحميل التطبيق */
        .btn-download {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 18px 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 800;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
            transition: 0.3s;
        }
        .btn-download:active { transform: scale(0.96); }

        .btn-download i {
            font-size: 24px;
            animation: bounce 1.5s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        /* شبكة الأقسام (قسمين لكل صف) */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            padding-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px 10px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .card:active {
            transform: scale(0.95);
            border-color: var(--secondary);
        }

        .card i {
            font-size: 38px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card span {
            font-size: 14px;
            font-weight: 800;
        }

        /* توافق الأجهزة شديدة الصغر */
        @media (max-width: 360px) {
            .grid-cards { gap: 10px; }
            .card { padding: 20px 5px; }
            .card i { font-size: 30px; }
            .top-socials a { width: 45px; height: 45px; font-size: 20px; }
            .btn-download { font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- العلامة المائية بالخلفية -->
    <div class="watermark">عالم البصري</div>
    <div class="overlay" id="overlay"></div>

    <!-- الشريط العلوي -->
    <header>
        <div class="header-controls">
            <!-- زر فتح القائمة الجانبية (ما زالت متوفرة كما تفضلت) -->
            <button class="icon-btn" id="menu-open-btn">
                <i class="fas fa-bars"></i>
            </button>
            <!-- زر التبديل الليلي/النهاري -->
            <button class="icon-btn" id="theme-btn">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <!-- شعار المنصة -->
        <div class="brand">
            <span class="arabic">عالم روميو التقني</span>
            <span class="english">The Technician</span>
        </div>
    </header>

    <!-- القائمة الجانبية -->
    <aside class="drawer" id="side-drawer">
        <button class="close-btn" id="menu-close-btn"><i class="fas fa-times"></i></button>
        <h3>جميع روابطنا</h3>
        <div class="social-list">
            <a href="https://t.me/Basritv" class="social-link tg-bg"><i class="fab fa-telegram-plane"></i><span>تليجرام</span></a>
            <a href="https://www.instagram.com/a_l__i19/" class="social-link ig-bg"><i class="fab fa-instagram"></i><span>انستجرام</span></a>
            <a href="https://www.youtube.com/@RomeoSyntax" class="social-link yt-bg"><i class="fab fa-youtube"></i><span>يوتيوب</span></a>
        </div>
    </aside>

    <!-- المحتوى المركزي للصفحة -->
    <main>

        <!-- الإضافة الجديدة: المواقع الاجتماعية الثلاثة بشكل أفقي متميز -->
        <div class="top-socials">
            <a href="https://t.me/Basritv" class="tg-bg"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://www.instagram.com/a_l__i19/" class="ig-bg"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@RomeoSyntax" class="yt-bg"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- زر تحميل التطبيق يقع تحت الأيقونات وفوق الأقسام -->
        <a href="https://play.google.com/store/apps/details?id=com.bsr.player.pro" class="btn-download">
            <i class="fas fa-cloud-download-alt"></i>
            <span>حمّل تطبيقنا لجميع الخدمات</span>
        </a>

        <!-- شبكة الأقسام متجاوبة -->
        <div class="grid-cards">
            <a href="https://albasri-tv.github.io/basri.html" class="card">
                <i class="fas fa-futbol"></i>
                <span>جدول المباريات</span>
            </a>
            <a href="https://albasri-tv.github.io/albasti4u.html" class="card">
                <i class="fas fa-film"></i>
                <span>المسلسلات والأفلام</span>
            </a>
            <a href="https://albasri-tv.github.io/Script.html" class="card">
                <i class="fas fa-code"></i>
                <span>سكريبت القنوات</span>
            </a>
            <a href="https://albasri-tv.github.io/bsr_player.html" class="card">
                <i class="fas fa-cogs"></i>
                <span>مولد مشغل BSR PLAYER</span>
            </a>
        </div>
        
    </main>

    <!-- الأكواد البرمجية للوظائف -->
    <script>
        const menuBtn = document.getElementById('menu-open-btn');
        const closeBtn = document.getElementById('menu-close-btn');
        const drawer = document.getElementById('side-drawer');
        const overlay = document.getElementById('overlay');
        const themeBtn = document.getElementById('theme-btn');
        const body = document.body;
        const themeIcon = themeBtn.querySelector('i');

        /* فتح وإغلاق القائمة المنزلقة */
        menuBtn.onclick = () => {
            drawer.classList.add('open');
            overlay.classList.add('active');
            body.style.overflow = 'hidden';
        };

        const closeDrawer = () => {
            drawer.classList.remove('open');
            overlay.classList.remove('active');
            body.style.overflow = 'auto';
        };

        closeBtn.onclick = closeDrawer;
        overlay.onclick = closeDrawer;

        /* تشغيل الوضع الليلي بشكل احترافي مع حفظ الاختيار */
        const applyTheme = (theme) => {
            if(theme === 'dark'){
                body.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-sun';
            } else {
                body.removeAttribute('data-theme');
                themeIcon.className = 'fas fa-moon';
            }
        };

        const savedTheme = localStorage.getItem('romeo_theme');
        if(savedTheme) {
            applyTheme(savedTheme);
        } else {
            const isDarkPref = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(isDarkPref ? 'dark' : 'light');
        }

        themeBtn.onclick = () => {
            if (body.getAttribute('data-theme') === 'dark') {
                applyTheme('light');
                localStorage.setItem('romeo_theme', 'light');
            } else {
                applyTheme('dark');
                localStorage.setItem('romeo_theme', 'dark');
            }
        };
    </script>
</body>
</html>
